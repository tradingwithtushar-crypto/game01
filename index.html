<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path Clear Puzzle</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background-color: white;
            width: 400px;
            height: 700px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: white;
            border-bottom: 2px solid #f0f4f8;
        }

        .back-btn {
            background-color: #d1d8ff;
            color: #333;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .level-info {
            text-align: center;
        }

        #level-text {
            color: #4a65ff;
            font-size: 16px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .hearts {
            font-size: 18px;
            letter-spacing: 2px;
        }

        .spacer {
            width: 40px;
        }

        canvas {
            background-color: white;
            display: block;
            margin: auto;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header class="top-bar">
            <button class="back-btn">◀</button>
            <div class="level-info">
                <h2 id="level-text">Level 1</h2>
                <div class="hearts" id="hearts-container">
                    ❤️❤️❤️❤️❤️
                </div>
            </div>
            <div class="spacer"></div>
        </header>

        <canvas id="gameCanvas" width="400" height="500"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const heartsDisplay = document.getElementById('hearts-container');

        let lives = 5;
        let shapes = [];

        // Helper function: Math to check if two line segments intersect
        function doLineSegmentsIntersect(p1, q1, p2, q2) {
            function ccw(A, B, C) {
                return (C.y - A.y) * (B.x - A.x) > (B.y - A.y) * (C.x - A.x);
            }
            return ccw(p1, p2, q2) !== ccw(q1, p2, q2) && ccw(p1, q1, p2) !== ccw(p1, q1, q2);
        }

        // Class to define our paths/lines
        class Shape {
            constructor(points) {
                this.points = points; 
                this.originalPoints = JSON.parse(JSON.stringify(points)); 
                this.isMoving = false;
                
                // Calculate direction based on the last two points (where the arrow is)
                let last = points[points.length - 1];
                let prev = points[points.length - 2];
                
                let dx = last.x - prev.x;
                let dy = last.y - prev.y;
                let length = Math.sqrt(dx * dx + dy * dy);
                
                // Normalize the vector for smooth movement speed
                this.speedX = (dx / length) * 5; 
                this.speedY = (dy / length) * 5;
            }

            draw() {
                if (this.points.length === 0) return;

                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                for (let i = 1; i < this.points.length; i++) {
                    ctx.lineTo(this.points[i].x, this.points[i].y);
                }
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 4;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.stroke();

                // Draw the Arrowhead at the last point
                let last = this.points[this.points.length - 1];
                let prev = this.points[this.points.length - 2];
                let angle = Math.atan2(last.y - prev.y, last.x - prev.x);
                
                ctx.beginPath();
                ctx.moveTo(last.x, last.y);
                ctx.lineTo(last.x - 10 * Math.cos(angle - Math.PI / 6), last.y - 10 * Math.sin(angle - Math.PI / 6));
                ctx.moveTo(last.x, last.y);
                ctx.lineTo(last.x - 10 * Math.cos(angle + Math.PI / 6), last.y - 10 * Math.sin(angle + Math.PI / 6));
                ctx.stroke();
            }

            update() {
                if (!this.isMoving) return;

                for (let p of this.points) {
                    p.x += this.speedX;
                    p.y += this.speedY;
                }

                for (let other of shapes) {
                    if (other === this || other.isMoving) continue;

                    for (let i = 0; i < this.points.length - 1; i++) {
                        for (let j = 0; j < other.points.length - 1; j++) {
                            if (doLineSegmentsIntersect(this.points[i], this.points[i+1], other.points[j], other.points[j+1])) {
                                // Collision
                                this.isMoving = false;
                                this.points = JSON.parse(JSON.stringify(this.originalPoints)); 
                                loseLife();
                                return;
                            }
                        }
                    }
                }

                // Remove shape if it fully leaves the canvas screen
                if (this.points[0].x > canvas.width + 100 || this.points[0].x < -100 ||
                    this.points[0].y > canvas.height + 100 || this.points[0].y < -100) {
                    shapes = shapes.filter(s => s !== this);
                }
            }
        }

        function loseLife() {
            lives--;
            let heartString = "";
            for(let i=0; i<lives; i++) heartString += "❤️";
            for(let i=lives; i<5; i++) heartString += "🤍";
            heartsDisplay.innerHTML = heartString;

            if (lives <= 0) {
                alert("Game Over! Refresh to try again.");
            }
        }

        // LEVEL DESIGN
        function initLevel() {
            shapes = [
                // Shape 1 (An "L" shape blocking shape 2)
                new Shape([{x: 100, y: 150}, {x: 100, y: 250}, {x: 250, y: 250}]), 
                // Shape 2 (A straight line trying to go down)
                new Shape([{x: 150, y: 100}, {x: 150, y: 350}]) 
            ];
        }

        // Click detection logic
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            for (let shape of shapes) {
                let p = new Path2D();
                p.moveTo(shape.points[0].x, shape.points[0].y);
                for (let i = 1; i < shape.points.length; i++) {
                    p.lineTo(shape.points[i].x, shape.points[i].y);
                }
                
                ctx.lineWidth = 15; // Generous click radius
                if (ctx.isPointInStroke(p, mouseX, mouseY) && !shape.isMoving) {
                    shape.isMoving = true;
                    break;
                }
            }
        });

        // Game Loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let shape of shapes) {
                shape.update();
                shape.draw();
            }
            
            requestAnimationFrame(animate);
        }

        // Start Game
        initLevel();
        animate();
    </script>
</body>
</html>
