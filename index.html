<script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const heartsDisplay = document.getElementById('hearts-container');

        let lives = 5;
        let shapes = [];

        class Shape {
            constructor(points) {
                this.points = points; 
                this.originalPoints = JSON.parse(JSON.stringify(points)); 
                this.isMoving = false;
                
                let last = points[points.length - 1];
                let prev = points[points.length - 2];
                
                let dx = last.x - prev.x;
                let dy = last.y - prev.y;
                let length = Math.sqrt(dx * dx + dy * dy);
                
                this.speedX = (dx / length) * 5; 
                this.speedY = (dy / length) * 5;
            }

            draw() {
                if (this.points.length === 0) return;

                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                for (let i = 1; i < this.points.length; i++) {
                    ctx.lineTo(this.points[i].x, this.points[i].y);
                }
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 6; 
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.stroke();

                // Draw Arrowhead
                let last = this.points[this.points.length - 1];
                let prev = this.points[this.points.length - 2];
                let angle = Math.atan2(last.y - prev.y, last.x - prev.x);
                
                ctx.beginPath();
                ctx.moveTo(last.x, last.y);
                ctx.lineTo(last.x - 12 * Math.cos(angle - Math.PI / 6), last.y - 12 * Math.sin(angle - Math.PI / 6));
                ctx.moveTo(last.x, last.y);
                ctx.lineTo(last.x - 12 * Math.cos(angle + Math.PI / 6), last.y - 12 * Math.sin(angle + Math.PI / 6));
                ctx.stroke();
            }

            update() {
                if (!this.isMoving) return;

                // Create a collision path of all OTHER stationary shapes
                let otherPaths = new Path2D();
                for (let other of shapes) {
                    if (other === this || other.isMoving) continue;
                    otherPaths.moveTo(other.points[0].x, other.points[0].y);
                    for (let i = 1; i < other.points.length; i++) {
                        otherPaths.lineTo(other.points[i].x, other.points[i].y);
                    }
                }

                // Move this shape
                for (let p of this.points) {
                    p.x += this.speedX;
                    p.y += this.speedY;
                }

                // COLLISION CHECK: Only check if moving parts hit a stationary line
                let hit = false;
                ctx.lineWidth = 8; // Hitbox thickness
                
                // 1. Check if the tip of the arrow crashes
                let tip = this.points[this.points.length - 1];
                if (ctx.isPointInStroke(otherPaths, tip.x + this.speedX, tip.y + this.speedY)) {
                    hit = true;
                }
                
                // 2. Check if the back-legs/joints crash while moving forward
                for(let i=0; i < this.points.length - 1; i++) {
                    let joint = this.points[i];
                    if (ctx.isPointInStroke(otherPaths, joint.x + this.speedX, joint.y + this.speedY)) {
                        hit = true;
                    }
                }

                if (hit) {
                    this.isMoving = false;
                    this.points = JSON.parse(JSON.stringify(this.originalPoints)); 
                    loseLife();
                    return;
                }

                // Remove shape if it fully leaves screen
                if (this.points[0].x > canvas.width + 100 || this.points[0].x < -100 ||
                    this.points[0].y > canvas.height + 100 || this.points[0].y < -100) {
                    shapes = shapes.filter(s => s !== this);
                }
            }
        }

        function loseLife() {
            lives--;
            let heartString = "";
            for(let i=0; i<lives; i++) heartString += "💜";
            for(let i=lives; i<5; i++) heartString += "🤍";
            heartsDisplay.innerHTML = heartString;

            if (lives <= 0) {
                alert("Game Over! Refresh to try again.");
            }
        }

        // EXACT LEVEL 1 LAYOUT
        function initLevel() {
            shapes = [
                // Shape 1: The L-Shape (Starts left, goes down, turns right)
                new Shape([{x: 120, y: 200}, {x: 120, y: 320}, {x: 280, y: 320}]), 
                // Shape 2: The Vertical line (Starts top, goes straight down)
                new Shape([{x: 200, y: 150}, {x: 200, y: 380}]) 
            ];
            
            // Set initial hearts UI
            heartsDisplay.innerHTML = "💜💜💜💜💜";
            document.getElementById('level-text').innerText = "Level 1";
        }

        // Click detection logic
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            for (let shape of shapes) {
                let p = new Path2D();
                p.moveTo(shape.points[0].x, shape.points[0].y);
                for (let i = 1; i < shape.points.length; i++) {
                    p.lineTo(shape.points[i].x, shape.points[i].y);
                }
                
                ctx.lineWidth = 20; 
                if (ctx.isPointInStroke(p, mouseX, mouseY) && !shape.isMoving) {
                    shape.isMoving = true;
                    break;
                }
            }
        });

        // Game Loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let shape of shapes) {
                shape.update();
                shape.draw();
            }
            requestAnimationFrame(animate);
        }

        // Start Game
        initLevel();
        animate();
    </script>
